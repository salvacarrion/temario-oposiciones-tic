site_name: Temario de Oposiciones TIC
site_description: Cuerpo Superior Técnico de Ingeniería Informática
site_author: Salvador Carrión Ponz
repo_name: salvacarrion/temario-oposiciones-tic
repo_url: https://github.com/salvacarrion/temario-oposiciones-tic
copyright: Copyright &copy; 2026 Salva Carrión &mdash; Licencia <a href="https://creativecommons.org/licenses/by-nc/4.0/deed.es"
  target="_blank" rel="noopener">CC BY-NC 4.0</a>
theme:
  name: material
  logo: logos/monkey128.png
  favicon: favicon/favicon.ico
  custom_dir: theme_overrides
  palette:
  - media: '(prefers-color-scheme: light)'
    scheme: default
    primary: teal
    accent: teal
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - media: '(prefers-color-scheme: dark)'
    scheme: slate
    primary: teal
    accent: teal
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
  features:
  - navigation.instant
  - navigation.top
  - navigation.tracking
  - navigation.indexes
  - navigation.expand
  - toc.integrate
  - content.code.copy
  - search.suggest
  - search.highlight
markdown_extensions:
- admonition
- pymdownx.details
- pymdownx.superfences
- pymdownx.arithmatex
- attr_list
- toc:
    toc_depth: 2
extra_javascript:
- javascripts/mathjax.js
- https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
extra_css:
- stylesheets/custom.css
docs_dir: src
site_dir: book-mkdocs
extra:
  generator: false
