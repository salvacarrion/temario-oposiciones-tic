# Configuración e ÍNDICE del libro. Al añadir/reordenar capítulos, edita
# la lista book.chapters (y renumera los ficheros NN-*.md si hace falta).
#
# El índice objetivo completo (108 capítulos, con subtemas) está en PLAN.md.
# Desde el 17-jul-2026 no quedan huecos: los 108 ficheros existen. Los
# bocetos de la fase 4 se listan con «⚠️ » en el nav de mkdocs.yml hasta
# pasar su revisión.

project:
  type: book
  output-dir: book-quarto
  resources:
    - src/media

lang: es

