format:
  html:
    # Temas Bootswatch disponibles: cosmo, flatly, litera, lumen, lux, materia,
    # minty, morph, pulse, quartz, sandstone, simplex, sketchy, slate, solar,
    # spacelab, superhero, united, vapor, yeti, zephyr, cerulean, cyborg,
    # darkly, journal (https://quarto.org/docs/output-formats/html-themes.html)
    theme: [cosmo, assets/custom.scss]
    toc: true
    toc-depth: 2
    number-depth: 2
    include-after-body: assets/custom.html
  pdf:
    documentclass: scrreprt
    toc-depth: 2
    number-depth: 2
    colorlinks: true
    include-in-header: assets/deep-lists.tex
