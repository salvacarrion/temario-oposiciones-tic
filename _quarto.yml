# Configuración e ÍNDICE del libro. Al añadir/reordenar capítulos, edita
# la lista book.chapters (y renumera los ficheros NN-*.md si hace falta).
#
# El índice objetivo completo (92 capítulos, con subtemas) está en PLAN.md.
# Los capítulos aún sin contenido NO se listan aquí (no publicar esqueletos),
# por eso hay huecos en la numeración de ficheros (17, 22, 33, 39, 46, 67,
# 69, 85-92): la numeración visible del libro se compactará sola hasta que
# existan. Los bocetos de la fase 4 sí se listan (llevan «⚠️ » en el nav de
# mkdocs.yml hasta pasar su revisión).

project:
  type: book
  output-dir: book-quarto
  resources:
    - src/media

lang: es

book:
  title: "Temario de Oposiciones TIC"
  subtitle: "Cuerpo Superior Técnico de Ingeniería Informática"
