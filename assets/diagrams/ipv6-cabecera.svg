<svg xmlns="http://www.w3.org/2000/svg" width="940" height="420" viewBox="0 0 940 420" font-family="Helvetica, Arial, sans-serif">
  <rect width="940" height="420" fill="#ffffff"/>
  <text x="20" y="40" font-size="19" font-weight="700" fill="#1f3a5f">Formato de la cabecera IPv6 (palabras de 32 bits)</text>

  <!-- Regla de bits -->
  <g font-size="10" fill="#8a949e">
    <text x="90" y="70">0</text><text x="190" y="70">4</text><text x="290" y="70">8</text><text x="390" y="70">12</text>
    <text x="490" y="70">16</text><text x="590" y="70">20</text><text x="690" y="70">24</text><text x="790" y="70">28</text><text x="882" y="70">31</text>
  </g>
  <g stroke="#c6d2dc" stroke-width="1">
    <line x1="90" y1="74" x2="90" y2="82"/><line x1="190" y1="74" x2="190" y2="82"/><line x1="290" y1="74" x2="290" y2="82"/>
    <line x1="390" y1="74" x2="390" y2="82"/><line x1="490" y1="74" x2="490" y2="82"/><line x1="590" y1="74" x2="590" y2="82"/>
    <line x1="690" y1="74" x2="690" y2="82"/><line x1="790" y1="74" x2="790" y2="82"/><line x1="890" y1="74" x2="890" y2="82"/>
  </g>

  <!-- Etiquetas de byte -->
  <g font-size="10" fill="#8a949e" text-anchor="end">
    <text x="80" y="110">0</text><text x="80" y="152">4</text><text x="80" y="204">8…20</text><text x="80" y="290">24…36</text>
  </g>

  <!-- Fila 1 -->
  <g stroke="#5b87b0" stroke-width="1.4" fill="#dbe7f3">
    <rect x="90" y="84" width="100" height="42"/>
    <rect x="190" y="84" width="200" height="42"/>
    <rect x="390" y="84" width="500" height="42"/>
  </g>
  <g text-anchor="middle">
    <text x="140" y="102" font-size="11.5" font-weight="700" fill="#22303c">Versión</text><text x="140" y="118" font-size="9.5" fill="#4a5b68">(4 bits)</text>
    <text x="290" y="102" font-size="11.5" font-weight="700" fill="#22303c">Clase de tráfico</text><text x="290" y="118" font-size="9.5" fill="#4a5b68">(8 bits)</text>
    <text x="640" y="102" font-size="11.5" font-weight="700" fill="#22303c">Etiqueta de flujo</text><text x="640" y="118" font-size="9.5" fill="#4a5b68">(20 bits)</text>
  </g>

  <!-- Fila 2 -->
  <g stroke="#5b87b0" stroke-width="1.4" fill="#dbe7f3">
    <rect x="90" y="126" width="400" height="42"/>
    <rect x="490" y="126" width="200" height="42"/>
    <rect x="690" y="126" width="200" height="42"/>
  </g>
  <g text-anchor="middle">
    <text x="290" y="144" font-size="11.5" font-weight="700" fill="#22303c">Longitud del campo de datos</text><text x="290" y="160" font-size="9.5" fill="#4a5b68">(16 bits)</text>
    <text x="590" y="144" font-size="11.5" font-weight="700" fill="#22303c">Cabecera siguiente</text><text x="590" y="160" font-size="9.5" fill="#4a5b68">(8 bits)</text>
    <text x="790" y="144" font-size="11.5" font-weight="700" fill="#22303c">Límite de saltos</text><text x="790" y="160" font-size="9.5" fill="#4a5b68">(8 bits)</text>
  </g>

  <!-- Direcciones -->
  <rect x="90" y="168" width="800" height="76" stroke="#5b87b0" stroke-width="1.4" fill="#c9d9e8"/>
  <text x="490" y="200" font-size="12" font-weight="700" fill="#22303c" text-anchor="middle">Dirección de origen</text>
  <text x="490" y="220" font-size="9.5" fill="#4a5b68" text-anchor="middle">(128 bits: 4 palabras)</text>
  <rect x="90" y="244" width="800" height="76" stroke="#5b87b0" stroke-width="1.4" fill="#c9d9e8"/>
  <text x="490" y="276" font-size="12" font-weight="700" fill="#22303c" text-anchor="middle">Dirección de destino</text>
  <text x="490" y="296" font-size="9.5" fill="#4a5b68" text-anchor="middle">(128 bits: 4 palabras)</text>

  <text x="90" y="352" font-size="11.5" fill="#4a5b68">Cabecera fija de <tspan font-weight="700">40 bytes</tspan> con solo <tspan font-weight="700">8 campos</tspan>; las opciones van en <tspan font-weight="700">cabeceras de extensión</tspan> encadenadas</text>
  <text x="90" y="370" font-size="11.5" fill="#4a5b68">mediante el campo «cabecera siguiente».</text>
  <text x="920" y="404" font-size="11.5" fill="#8a949e" text-anchor="end">Elaboración propia.</text>
</svg>
