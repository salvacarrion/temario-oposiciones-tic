<svg xmlns="http://www.w3.org/2000/svg" width="760" height="140" viewBox="0 0 760 140" font-family="Helvetica, Arial, sans-serif">
  <rect width="760" height="140" fill="#ffffff"/>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5a7d99"/>
    </marker>
  </defs>

  <!-- Almacén -->
  <line x1="30" y1="53" x2="200" y2="53" stroke="#22303c" stroke-width="2"/>
  <line x1="30" y1="87" x2="200" y2="87" stroke="#22303c" stroke-width="2"/>
  <text x="115" y="75" font-size="12.5" font-weight="700" fill="#22303c" text-anchor="middle">A1 · Base de datos</text>

  <!-- Proceso -->
  <circle cx="380" cy="70" r="50" fill="#dbe7f3" stroke="#5b87b0" stroke-width="2"/>
  <line x1="346" y1="55" x2="414" y2="55" stroke="#5b87b0" stroke-width="1.2"/>
  <text x="380" y="48" font-size="12.5" font-weight="700" fill="#22303c" text-anchor="middle">0</text>
  <text x="380" y="81" font-size="13.5" font-weight="700" fill="#22303c" text-anchor="middle">Sistema</text>

  <!-- Entidad externa -->
  <rect x="580" y="42" width="150" height="56" fill="#eef1f4" stroke="#9aa5ae" stroke-width="1.6"/>
  <text x="655" y="75" font-size="13" font-weight="700" fill="#22303c" text-anchor="middle">CLIENTE</text>

  <!-- Flujos -->
  <g stroke="#5a7d99" stroke-width="1.7" fill="none" marker-end="url(#arr)">
    <line x1="208" y1="70" x2="324" y2="70"/>
    <line x1="436" y1="70" x2="574" y2="70"/>
  </g>
  <g font-size="11" fill="#4a5b68" text-anchor="middle">
    <text x="266" y="60">entrada</text>
    <text x="505" y="60">salida</text>
  </g>
</svg>
