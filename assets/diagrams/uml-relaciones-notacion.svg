<svg xmlns="http://www.w3.org/2000/svg" width="940" height="460" viewBox="0 0 940 460" font-family="Helvetica, Arial, sans-serif">
  <rect width="940" height="460" fill="#ffffff"/>
  <text x="40" y="42" font-size="19" font-weight="700" fill="#1f3a5f">Notación de las relaciones entre clasificadores</text>

  <defs>
    <marker id="gen" viewBox="0 0 14 12" refX="13" refY="6" markerWidth="14" markerHeight="12" orient="auto-start-reverse">
      <path d="M 1 1 L 13 6 L 1 11 Z" fill="#ffffff" stroke="#4a5b68" stroke-width="1.3"/>
    </marker>
    <marker id="open" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11" fill="none" stroke="#4a5b68" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Paneles -->
  <g fill="#f8fafb" stroke="#c6d2dc" stroke-width="1.3">
    <rect x="40" y="66" width="420" height="112" rx="10"/>
    <rect x="480" y="66" width="420" height="112" rx="10"/>
    <rect x="40" y="192" width="420" height="112" rx="10"/>
    <rect x="480" y="192" width="420" height="112" rx="10"/>
    <rect x="40" y="318" width="420" height="112" rx="10"/>
    <rect x="480" y="318" width="420" height="112" rx="10"/>
  </g>
  <g font-size="12.5" font-weight="700" fill="#1f3a5f">
    <text x="56" y="90">Dependencia</text>
    <text x="496" y="90">Asociación</text>
    <text x="56" y="216">Agregación</text>
    <text x="496" y="216">Composición</text>
    <text x="56" y="342">Generalización (herencia)</text>
    <text x="496" y="342">Realización</text>
  </g>

  <!-- Cajas de ejemplo -->
  <g stroke="#5b87b0" stroke-width="1.3" fill="#dbe7f3">
    <rect x="70" y="112" width="110" height="28"/>
    <rect x="320" y="112" width="110" height="28"/>
    <rect x="510" y="112" width="110" height="28"/>
    <rect x="760" y="112" width="110" height="28"/>
    <rect x="70" y="238" width="110" height="28"/>
    <rect x="320" y="238" width="110" height="28"/>
    <rect x="510" y="238" width="110" height="28"/>
    <rect x="760" y="238" width="110" height="28"/>
    <rect x="70" y="364" width="110" height="28"/>
    <rect x="320" y="364" width="110" height="28"/>
    <rect x="510" y="364" width="110" height="28"/>
    <rect x="760" y="358" width="110" height="40"/>
  </g>
  <g font-size="11.5" font-weight="700" fill="#22303c" text-anchor="middle">
    <text x="125" y="130">Cliente</text>
    <text x="375" y="130">Servicio</text>
    <text x="565" y="130">Persona</text>
    <text x="815" y="130">Revista</text>
    <text x="125" y="256">Equipo</text>
    <text x="375" y="256">Jugador</text>
    <text x="565" y="256">Empresa</text>
    <text x="815" y="256">Factura</text>
    <text x="125" y="382">Alumno</text>
    <text x="375" y="382">Persona</text>
    <text x="565" y="382">TarjetaPago</text>
  </g>
  <text x="815" y="374" font-size="10" fill="#4a5b68" text-anchor="middle">«interfaz»</text>
  <text x="815" y="390" font-size="11.5" font-weight="700" fill="#22303c" text-anchor="middle">IPago</text>

  <!-- Dependencia: flecha discontinua abierta -->
  <line x1="180" y1="126" x2="314" y2="126" stroke="#4a5b68" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#open)"/>
  <text x="250" y="160" font-size="10.5" fill="#4a5b68" text-anchor="middle">usa a otro y le afectan sus cambios</text>

  <!-- Asociación: línea continua con multiplicidades -->
  <line x1="620" y1="126" x2="760" y2="126" stroke="#4a5b68" stroke-width="1.5"/>
  <text x="630" y="118" font-size="10" fill="#4a5b68">1</text>
  <text x="736" y="118" font-size="10" fill="#4a5b68">0..*</text>
  <text x="690" y="144" font-size="10" fill="#4a5b68" text-anchor="middle">lee ▸</text>
  <text x="690" y="164" font-size="10.5" fill="#4a5b68" text-anchor="middle">relación estructural simple, con multiplicidad</text>

  <!-- Agregación: rombo hueco en el todo -->
  <line x1="206" y1="252" x2="314" y2="252" stroke="#4a5b68" stroke-width="1.5"/>
  <polygon points="180,252 194,245 208,252 194,259" fill="#ffffff" stroke="#4a5b68" stroke-width="1.4"/>
  <text x="250" y="286" font-size="10.5" fill="#4a5b68" text-anchor="middle">todo-parte débil: la parte existe sin el todo</text>

  <!-- Composición: rombo relleno en el todo -->
  <line x1="646" y1="252" x2="754" y2="252" stroke="#4a5b68" stroke-width="1.5"/>
  <polygon points="620,252 634,245 648,252 634,259" fill="#4a5b68" stroke="#4a5b68" stroke-width="1.4"/>
  <text x="690" y="286" font-size="10.5" fill="#4a5b68" text-anchor="middle">todo-parte fuerte: la parte nace y muere con el todo</text>

  <!-- Generalización: triángulo hueco hacia la superclase -->
  <line x1="180" y1="378" x2="308" y2="378" stroke="#4a5b68" stroke-width="1.5" marker-end="url(#gen)"/>
  <text x="250" y="412" font-size="10.5" fill="#4a5b68" text-anchor="middle">la subclase hereda estructura y comportamiento</text>

  <!-- Realización: triángulo hueco discontinuo hacia la interfaz -->
  <line x1="620" y1="378" x2="748" y2="378" stroke="#4a5b68" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#gen)"/>
  <text x="690" y="412" font-size="10.5" fill="#4a5b68" text-anchor="middle">la clase implementa el contrato de una interfaz</text>

  <text x="900" y="450" font-size="12" fill="#8a949e" text-anchor="end">Elaboración propia.</text>
</svg>
