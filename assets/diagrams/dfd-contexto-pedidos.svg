<svg xmlns="http://www.w3.org/2000/svg" width="940" height="700" viewBox="0 0 940 700" font-family="Helvetica, Arial, sans-serif">
  <rect width="940" height="700" fill="#ffffff"/>
  <text x="40" y="46" font-size="20" font-weight="700" fill="#1f3a5f">Diagrama de contexto (nivel 0) de un sistema de pedidos</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5a7d99"/>
    </marker>
  </defs>

  <!-- Proceso central -->
  <circle cx="470" cy="390" r="85" fill="#dbe7f3" stroke="#5b87b0" stroke-width="2"/>
  <line x1="412" y1="348" x2="528" y2="348" stroke="#5b87b0" stroke-width="1.2"/>
  <text x="470" y="338" font-size="13" font-weight="700" fill="#22303c" text-anchor="middle">0</text>
  <text x="470" y="380" font-size="13.5" font-weight="700" fill="#22303c" text-anchor="middle">Sistema de</text>
  <text x="470" y="398" font-size="13.5" font-weight="700" fill="#22303c" text-anchor="middle">pedidos de</text>
  <text x="470" y="416" font-size="13.5" font-weight="700" fill="#22303c" text-anchor="middle">inventario</text>

  <!-- Entidades externas -->
  <g stroke="#9aa5ae" stroke-width="1.6" fill="#eef1f4">
    <rect x="60" y="110" width="160" height="240"/>
    <rect x="720" y="110" width="170" height="180"/>
    <rect x="60" y="530" width="160" height="90"/>
    <rect x="720" y="530" width="170" height="90"/>
  </g>
  <g font-size="13" font-weight="700" fill="#22303c" text-anchor="middle">
    <text x="140" y="234">CLIENTE</text>
    <text x="805" y="204">PROVEEDOR</text>
    <text x="140" y="579">DIRECCIÓN</text>
    <text x="805" y="568">ENTIDAD DE</text>
    <text x="805" y="584">TARJETA DE CRÉDITO</text>
  </g>

  <!-- Cliente -> Sistema -->
  <g stroke="#5a7d99" stroke-width="1.6" fill="none" marker-end="url(#arr)">
    <line x1="220" y1="132" x2="404" y2="330"/>
    <line x1="220" y1="170" x2="394" y2="352"/>
    <line x1="220" y1="208" x2="388" y2="375"/>
  </g>
  <!-- Sistema -> Cliente -->
  <g stroke="#5a7d99" stroke-width="1.6" fill="none" marker-end="url(#arr)">
    <line x1="388" y1="402" x2="220" y2="252"/>
    <line x1="392" y1="425" x2="220" y2="290"/>
    <line x1="400" y1="447" x2="220" y2="328"/>
  </g>
  <g font-size="10.5" fill="#4a5b68" paint-order="stroke" stroke="#ffffff" stroke-width="3.5" stroke-linejoin="round">
    <text x="228" y="127">pedido del cliente</text>
    <text x="228" y="165">pago del cliente</text>
    <text x="228" y="203">devolución</text>
    <text x="228" y="247">confirmación del pedido</text>
    <text x="228" y="285">factura del cliente</text>
    <text x="228" y="323">envío al cliente</text>
  </g>

  <!-- Sistema -> Proveedor -->
  <g stroke="#5a7d99" stroke-width="1.6" fill="none" marker-end="url(#arr)">
    <line x1="540" y1="335" x2="716" y2="140"/>
    <line x1="548" y1="355" x2="716" y2="185"/>
  </g>
  <!-- Proveedor -> Sistema -->
  <g stroke="#5a7d99" stroke-width="1.6" fill="none" marker-end="url(#arr)">
    <line x1="716" y1="230" x2="552" y2="375"/>
    <line x1="716" y1="275" x2="546" y2="398"/>
  </g>
  <g font-size="10.5" fill="#4a5b68" text-anchor="end" paint-order="stroke" stroke="#ffffff" stroke-width="3.5" stroke-linejoin="round">
    <text x="712" y="135">pedido al proveedor</text>
    <text x="712" y="180">pago al proveedor</text>
    <text x="712" y="225">producto y stock</text>
    <text x="712" y="270">factura del proveedor</text>
  </g>

  <!-- Dirección <-> Sistema -->
  <g stroke="#5a7d99" stroke-width="1.6" fill="none" marker-end="url(#arr)">
    <line x1="220" y1="548" x2="401" y2="440"/>
    <line x1="415" y1="460" x2="220" y2="588"/>
  </g>
  <g font-size="10.5" fill="#4a5b68" paint-order="stroke" stroke="#ffffff" stroke-width="3.5" stroke-linejoin="round">
    <text x="228" y="543">políticas de ventas y cuotas</text>
    <text x="228" y="606">informe de ventas</text>
  </g>

  <!-- Tarjeta <-> Sistema -->
  <g stroke="#5a7d99" stroke-width="1.6" fill="none" marker-end="url(#arr)">
    <line x1="536" y1="443" x2="716" y2="548"/>
    <line x1="716" y1="590" x2="544" y2="464"/>
  </g>
  <g font-size="10.5" fill="#4a5b68" text-anchor="end" paint-order="stroke" stroke="#ffffff" stroke-width="3.5" stroke-linejoin="round">
    <text x="712" y="543">petición de comprobación de crédito</text>
    <text x="712" y="608">detalles de crédito</text>
  </g>

  <text x="900" y="684" font-size="12" fill="#8a949e" text-anchor="end">Elaboración propia.</text>
</svg>
