  <circle cx="395" cy="375" r="5" fill="#22303c"/>
  <text x="240" y="435" font-size="10" fill="#8a949e">estados de un objeto y transiciones ante eventos</text>

  <!-- 4. De secuencia -->
  <rect x="545" y="310" width="110" height="32" fill="#dbe7f3" stroke="#5b87b0" stroke-width="1.4"/>
  <text x="600" y="330" font-size="11.5" font-weight="700" fill="#22303c" text-anchor="middle">:Ciudadano</text>
  <rect x="755" y="310" width="100" height="32" fill="#dbe7f3" stroke="#5b87b0" stroke-width="1.4"/>
  <text x="805" y="330" font-size="11.5" font-weight="700" fill="#22303c" text-anchor="middle">:Sede</text>
  <g stroke="#9aa5ae" stroke-width="1.3" stroke-dasharray="5 4">
