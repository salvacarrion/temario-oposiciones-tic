    <rect x="230" y="540" width="105" height="34"/>
    <rect x="230" y="620" width="105" height="34"/>
  </g>
  <g font-size="11.5" font-weight="700" fill="#22303c" text-anchor="middle" text-decoration="underline">
    <text x="122" y="561">:Interfaz</text>
    <text x="282" y="561">:Control</text>
    <text x="282" y="641">:Entidad</text>
  </g>
  <line x1="175" y1="557" x2="230" y2="557" stroke="#4a5b68" stroke-width="1.4"/>
  <line x1="282" y1="574" x2="282" y2="620" stroke="#4a5b68" stroke-width="1.4"/>
  <line x1="188" y1="545" x2="216" y2="545" stroke="#4a5b68" stroke-width="1.3" marker-end="url(#arrf)"/>
  <text x="202" y="536" font-size="10" fill="#4a5b68" text-anchor="middle">1: consultar()</text>
  <line x1="294" y1="586" x2="294" y2="610" stroke="#4a5b68" stroke-width="1.3" marker-end="url(#arrf)"/>
  <text x="306" y="601" font-size="10" fill="#4a5b68">1.1: leer()</text>
  <text x="150" y="600" font-size="10" fill="#8a949e">mensajes numerados</text>
  <text x="150" y="614" font-size="10" fill="#8a949e">sobre los enlaces</text>

  <!-- 6. De tiempos -->
  <g font-size="10.5" fill="#4a5b68" text-anchor="end">
    <text x="608" y="552">Rojo</text>
    <text x="608" y="572">Ámbar</text>
    <text x="608" y="592">Verde</text>
    <text x="608" y="622">Cruza</text>
    <text x="608" y="642">Espera</text>
  </g>
  <g font-size="10" font-weight="700" fill="#1f3a5f">
    <text x="530" y="552">Semáforo</text>
    <text x="530" y="622">Peatón</text>
  </g>
  <g stroke="#dfe5ea" stroke-width="1" stroke-dasharray="3 4">
