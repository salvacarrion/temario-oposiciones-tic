    <line x1="620" y1="568" x2="880" y2="568"/>
    <line x1="620" y1="588" x2="880" y2="588"/>
    <line x1="620" y1="618" x2="880" y2="618"/>
    <line x1="620" y1="638" x2="880" y2="638"/>
  </g>
  <path d="M 620 588 H 680 V 568 H 715 V 548 H 790 V 588 H 880" fill="none" stroke="#2e5f8a" stroke-width="2.2"/>
  <path d="M 620 638 H 715 V 618 H 790 V 638 H 880" fill="none" stroke="#b23b2e" stroke-width="2.2"/>
  <line x1="620" y1="656" x2="880" y2="656" stroke="#9aa5ae" stroke-width="1.3"/>
  <g stroke="#9aa5ae" stroke-width="1.3">
    <line x1="620" y1="653" x2="620" y2="659"/>
    <line x1="680" y1="653" x2="680" y2="659"/>
    <line x1="715" y1="653" x2="715" y2="659"/>
    <line x1="790" y1="653" x2="790" y2="659"/>
    <line x1="880" y1="653" x2="880" y2="659"/>
  </g>
  <text x="750" y="674" font-size="10.5" fill="#4a5b68" text-anchor="middle">tiempo: el peatón cruza mientras el semáforo está en rojo</text>

  <!-- 7. Global de interacciones -->
  <circle cx="290" cy="790" r="8" fill="#22303c"/>
  <g stroke="#5b87b0" stroke-width="1.4" fill="#ffffff">
    <rect x="315" y="765" width="150" height="50"/>
    <rect x="565" y="765" width="150" height="50"/>
  </g>
  <g fill="#dbe7f3" stroke="#5b87b0" stroke-width="1.2">
    <rect x="315" y="765" width="36" height="16"/>
    <rect x="565" y="765" width="36" height="16"/>
  </g>
  <text x="333" y="777" font-size="9.5" font-weight="700" fill="#1f3a5f" text-anchor="middle">ref</text>
  <text x="583" y="777" font-size="9.5" font-weight="700" fill="#1f3a5f" text-anchor="middle">ref</text>
  <text x="390" y="800" font-size="11.5" font-weight="700" fill="#22303c" text-anchor="middle">Autenticación</text>
  <text x="640" y="800" font-size="11.5" font-weight="700" fill="#22303c" text-anchor="middle">Tramitación</text>
  <path d="M 518 774 L 534 790 L 518 806 L 502 790 Z" fill="#faeed7" stroke="#c9a24b" stroke-width="1.5"/>
  <g stroke="#4a5b68" stroke-width="1.6" fill="none" marker-end="url(#arrf)">
    <line x1="298" y1="790" x2="311" y2="790"/>
    <line x1="465" y1="790" x2="498" y2="790"/>
    <line x1="534" y1="790" x2="561" y2="790"/>
    <line x1="715" y1="790" x2="741" y2="790"/>
    <line x1="518" y1="806" x2="518" y2="841"/>
  </g>
  <text x="547" y="782" font-size="9.5" fill="#4a5b68">[ok]</text>
  <text x="526" y="830" font-size="9.5" fill="#4a5b68">[error]</text>
  <circle cx="752" cy="790" r="9" fill="none" stroke="#22303c" stroke-width="1.6"/>
  <circle cx="752" cy="790" r="4.5" fill="#22303c"/>
  <circle cx="518" cy="852" r="9" fill="none" stroke="#22303c" stroke-width="1.6"/>
  <circle cx="518" cy="852" r="4.5" fill="#22303c"/>

  <text x="900" y="906" font-size="12" fill="#8a949e" text-anchor="end">Elaboración propia.</text>
