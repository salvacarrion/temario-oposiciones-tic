<svg xmlns="http://www.w3.org/2000/svg" width="940" height="920" viewBox="0 0 940 920" font-family="Helvetica, Arial, sans-serif">
  <rect width="940" height="920" fill="#ffffff"/>
  <text x="40" y="46" font-size="20" font-weight="700" fill="#1f3a5f">Los 7 diagramas de comportamiento de UML: ejemplos mínimos</text>

  <defs>
    <marker id="arrf" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a5b68"/>
    </marker>
    <marker id="open" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11" fill="none" stroke="#4a5b68" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Paneles -->
  <g fill="#f8fafb" stroke="#c6d2dc" stroke-width="1.4">
    <rect x="40" y="70" width="400" height="190" rx="10"/>
    <rect x="510" y="70" width="400" height="190" rx="10"/>
    <rect x="40" y="280" width="400" height="190" rx="10"/>
    <rect x="510" y="280" width="400" height="190" rx="10"/>
    <rect x="40" y="490" width="400" height="190" rx="10"/>
    <rect x="510" y="490" width="400" height="190" rx="10"/>
    <rect x="240" y="700" width="560" height="190" rx="10"/>
  </g>
  <g font-size="13" font-weight="700" fill="#1f3a5f">
    <text x="56" y="94">De actividades</text>
    <text x="526" y="94">De casos de uso</text>
    <text x="56" y="304">De máquina de estados</text>
    <text x="526" y="304">De secuencia</text>
    <text x="56" y="514">De comunicación</text>
    <text x="526" y="514">De tiempos</text>
    <text x="256" y="724">Global de interacciones</text>
  </g>

  <!-- 1. De actividades -->
  <circle cx="78" cy="150" r="8" fill="#22303c"/>
  <rect x="101" y="128" width="125" height="44" rx="14" fill="#dbe7f3" stroke="#5b87b0" stroke-width="1.4"/>
  <text x="163" y="146" font-size="11.5" font-weight="700" fill="#22303c" text-anchor="middle">Revisar la</text>
  <text x="163" y="162" font-size="11.5" font-weight="700" fill="#22303c" text-anchor="middle">solicitud</text>
  <path d="M 270 132 L 288 150 L 270 168 L 252 150 Z" fill="#faeed7" stroke="#c9a24b" stroke-width="1.5"/>
  <rect x="322" y="128" width="95" height="44" rx="14" fill="#dbe7f3" stroke="#5b87b0" stroke-width="1.4"/>
  <text x="369" y="155" font-size="11.5" font-weight="700" fill="#22303c" text-anchor="middle">Notificar</text>
  <g stroke="#4a5b68" stroke-width="1.6" fill="none" marker-end="url(#arrf)">
    <line x1="86" y1="150" x2="97" y2="150"/>
    <line x1="226" y1="150" x2="248" y2="150"/>
    <line x1="288" y1="150" x2="318" y2="150"/>
    <line x1="369" y1="172" x2="369" y2="201"/>
    <line x1="270" y1="168" x2="270" y2="201"/>
  </g>
  <text x="303" y="166" font-size="9.5" fill="#4a5b68">[aprobada]</text>
  <text x="277" y="192" font-size="9.5" fill="#4a5b68">[rechazada]</text>
  <circle cx="369" cy="214" r="9" fill="none" stroke="#22303c" stroke-width="1.6"/>
  <circle cx="369" cy="214" r="4.5" fill="#22303c"/>
  <circle cx="270" cy="214" r="9" fill="none" stroke="#22303c" stroke-width="1.6"/>
  <circle cx="270" cy="214" r="4.5" fill="#22303c"/>

  <!-- 2. De casos de uso -->
  <circle cx="555" cy="115" r="8" fill="none" stroke="#22303c" stroke-width="1.6"/>
  <g stroke="#22303c" stroke-width="1.6">
    <line x1="555" y1="123" x2="555" y2="143"/>
    <line x1="543" y1="130" x2="567" y2="130"/>
    <line x1="555" y1="143" x2="546" y2="158"/>
    <line x1="555" y1="143" x2="564" y2="158"/>
  </g>
  <text x="555" y="176" font-size="10.5" fill="#4a5b68" text-anchor="middle">Ciudadano</text>
  <rect x="600" y="108" width="290" height="138" fill="#ffffff" stroke="#5b87b0" stroke-width="1.4"/>
  <text x="745" y="127" font-size="11.5" font-weight="700" fill="#1f3a5f" text-anchor="middle">Sede electrónica</text>
  <ellipse cx="745" cy="160" rx="88" ry="18" fill="#dbe7f3" stroke="#5b87b0" stroke-width="1.4"/>
  <text x="745" y="164" font-size="11" fill="#22303c" text-anchor="middle">Presentar solicitud</text>
  <ellipse cx="700" cy="212" rx="66" ry="17" fill="#dbe7f3" stroke="#5b87b0" stroke-width="1.4"/>
  <text x="700" y="216" font-size="10.5" fill="#22303c" text-anchor="middle">Consultar expediente</text>
  <ellipse cx="828" cy="212" rx="52" ry="17" fill="#eef1f4" stroke="#9aa5ae" stroke-width="1.4"/>
  <text x="828" y="216" font-size="10.5" fill="#22303c" text-anchor="middle">Identificarse</text>
  <line x1="745" y1="178" x2="810" y2="197" stroke="#4a5b68" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#open)"/>
  <text x="792" y="184" font-size="9" fill="#4a5b68">«include»</text>
  <g stroke="#4a5b68" stroke-width="1.4">
    <line x1="567" y1="132" x2="657" y2="157"/>
    <line x1="567" y1="138" x2="637" y2="205"/>
  </g>

  <!-- 3. De máquina de estados -->
  <circle cx="72" cy="375" r="8" fill="#22303c"/>
  <rect x="95" y="352" width="100" height="46" rx="12" fill="#dbe7f3" stroke="#5b87b0" stroke-width="1.4"/>
  <text x="145" y="379" font-size="11.5" font-weight="700" fill="#22303c" text-anchor="middle">Borrador</text>
  <rect x="240" y="352" width="110" height="46" rx="12" fill="#dbe7f3" stroke="#5b87b0" stroke-width="1.4"/>
