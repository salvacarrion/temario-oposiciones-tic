  <line x1="800" y1="425" x2="609" y2="425" stroke="#4a5b68" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#open)"/>
  <text x="700" y="417" font-size="10.5" fill="#4a5b68" text-anchor="middle">justificante</text>

  <!-- 5. De comunicación -->
  <g stroke="#5b87b0" stroke-width="1.4" fill="#dbe7f3">
