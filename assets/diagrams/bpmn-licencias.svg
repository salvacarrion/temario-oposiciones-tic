<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="500" viewBox="0 0 1020 500" font-family="Helvetica, Arial, sans-serif">
  <rect width="1020" height="500" fill="#ffffff"/>
  <text x="40" y="42" font-size="19" font-weight="700" fill="#1f3a5f">Modelo BPMN de la tramitación de licencias urbanísticas (nivel descriptivo)</text>

  <defs>
    <marker id="arrf" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a5b68"/>
    </marker>
    <marker id="arrm" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#ffffff" stroke="#4a5b68" stroke-width="1.3"/>
    </marker>
    <marker id="dotm" viewBox="0 0 8 8" refX="4" refY="4" markerWidth="6" markerHeight="6" orient="auto">
      <circle cx="4" cy="4" r="3" fill="#ffffff" stroke="#4a5b68" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Piscina cerrada: Ciudadano -->
  <rect x="40" y="70" width="940" height="52" fill="#ffffff" stroke="#5b87b0" stroke-width="1.6"/>
  <text x="510" y="101" font-size="13" font-weight="700" fill="#1f3a5f" text-anchor="middle">Ciudadano</text>

  <!-- Piscina abierta: Generalitat Valenciana -->
  <rect x="40" y="170" width="940" height="270" fill="#ffffff" stroke="#5b87b0" stroke-width="1.6"/>
  <rect x="40" y="170" width="28" height="270" fill="#dbe7f3" stroke="#5b87b0" stroke-width="1.6"/>
  <text x="58" y="305" font-size="12.5" font-weight="700" fill="#1f3a5f" text-anchor="middle" transform="rotate(-90 58 305)">Generalitat Valenciana</text>

  <!-- Evento inicial (mensaje) -->
  <circle cx="120" cy="250" r="21" fill="#e9f2ea" stroke="#4e7d52" stroke-width="2"/>
  <rect x="111" y="244" width="18" height="12" fill="#ffffff" stroke="#4e7d52" stroke-width="1.4"/>
  <path d="M 111 244 l 9 7 l 9 -7" fill="none" stroke="#4e7d52" stroke-width="1.4"/>
  <text x="120" y="292" font-size="11" fill="#4a5b68" text-anchor="middle">solicitud</text>
  <text x="120" y="306" font-size="11" fill="#4a5b68" text-anchor="middle">recibida</text>

  <!-- Tarea: registrar y validar -->
  <rect x="165" y="220" width="145" height="60" rx="10" fill="#dbe7f3" stroke="#5b87b0" stroke-width="1.6"/>
  <text x="237" y="246" font-size="12.5" font-weight="700" fill="#22303c" text-anchor="middle">Registrar y validar</text>
  <text x="237" y="264" font-size="12.5" font-weight="700" fill="#22303c" text-anchor="middle">documentación</text>

  <!-- Compuerta XOR: documentación completa -->
  <path d="M 355 222 L 383 250 L 355 278 L 327 250 Z" fill="#faeed7" stroke="#c9a24b" stroke-width="1.8"/>
  <line x1="347" y1="242" x2="363" y2="258" stroke="#8a6a1c" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="363" y1="242" x2="347" y2="258" stroke="#8a6a1c" stroke-width="2.2" stroke-linecap="round"/>
  <text x="325" y="207" font-size="11.5" fill="#4a5b68" text-anchor="middle">¿documentación completa?</text>

  <!-- Tarea: evaluar solicitud -->
  <rect x="430" y="220" width="130" height="60" rx="10" fill="#dbe7f3" stroke="#5b87b0" stroke-width="1.6"/>
  <text x="495" y="255" font-size="12.5" font-weight="700" fill="#22303c" text-anchor="middle">Evaluar solicitud</text>

  <!-- Compuerta XOR: evaluación favorable -->
  <path d="M 605 222 L 633 250 L 605 278 L 577 250 Z" fill="#faeed7" stroke="#c9a24b" stroke-width="1.8"/>
  <line x1="597" y1="242" x2="613" y2="258" stroke="#8a6a1c" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="613" y1="242" x2="597" y2="258" stroke="#8a6a1c" stroke-width="2.2" stroke-linecap="round"/>
  <text x="605" y="207" font-size="11.5" fill="#4a5b68" text-anchor="middle">¿evaluación favorable?</text>

  <!-- Tarea: resolución aprobatoria -->
  <rect x="660" y="220" width="150" height="60" rx="10" fill="#dbe7f3" stroke="#5b87b0" stroke-width="1.6"/>
  <text x="735" y="246" font-size="12.5" font-weight="700" fill="#22303c" text-anchor="middle">Emitir resolución</text>
  <text x="735" y="264" font-size="12.5" font-weight="700" fill="#22303c" text-anchor="middle">aprobatoria</text>

  <!-- Tarea: resolución denegatoria -->
  <rect x="660" y="340" width="150" height="60" rx="10" fill="#dbe7f3" stroke="#5b87b0" stroke-width="1.6"/>
  <text x="735" y="366" font-size="12.5" font-weight="700" fill="#22303c" text-anchor="middle">Emitir resolución</text>
  <text x="735" y="384" font-size="12.5" font-weight="700" fill="#22303c" text-anchor="middle">denegatoria</text>

  <!-- Compuerta XOR de convergencia -->
  <path d="M 855 222 L 883 250 L 855 278 L 827 250 Z" fill="#faeed7" stroke="#c9a24b" stroke-width="1.8"/>
  <line x1="847" y1="242" x2="863" y2="258" stroke="#8a6a1c" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="863" y1="242" x2="847" y2="258" stroke="#8a6a1c" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Evento final (mensaje) -->
  <circle cx="930" cy="250" r="20" fill="#fbeae7" stroke="#b23b2e" stroke-width="4.5"/>
  <rect x="921" y="244" width="18" height="12" fill="#b23b2e"/>
  <path d="M 921 244 l 9 7 l 9 -7" fill="none" stroke="#ffffff" stroke-width="1.4"/>
  <text x="930" y="292" font-size="11" fill="#4a5b68" text-anchor="middle">resolución</text>
  <text x="930" y="306" font-size="11" fill="#4a5b68" text-anchor="middle">enviada</text>

  <!-- Tarea: requerir subsanación -->
  <rect x="280" y="340" width="150" height="60" rx="10" fill="#dbe7f3" stroke="#5b87b0" stroke-width="1.6"/>
  <text x="355" y="366" font-size="12.5" font-weight="700" fill="#22303c" text-anchor="middle">Requerir</text>
  <text x="355" y="384" font-size="12.5" font-weight="700" fill="#22303c" text-anchor="middle">subsanación</text>

  <!-- Evento intermedio temporizador -->
  <circle cx="225" cy="370" r="21" fill="#faeed7" stroke="#c9a24b" stroke-width="2"/>
  <circle cx="225" cy="370" r="15.5" fill="none" stroke="#c9a24b" stroke-width="2"/>
  <circle cx="225" cy="370" r="10" fill="none" stroke="#8a6a1c" stroke-width="1.4"/>
  <line x1="225" y1="370" x2="225" y2="363" stroke="#8a6a1c" stroke-width="1.4"/>
  <line x1="225" y1="370" x2="230" y2="373" stroke="#8a6a1c" stroke-width="1.4"/>
  <text x="225" y="424" font-size="11" fill="#4a5b68" text-anchor="middle">plazo de subsanación</text>

  <!-- Flujos de secuencia -->
  <g stroke="#4a5b68" stroke-width="2" fill="none" marker-end="url(#arrf)">
    <line x1="141" y1="250" x2="161" y2="250"/>
    <line x1="310" y1="250" x2="323" y2="250"/>
    <line x1="383" y1="250" x2="426" y2="250"/>
    <line x1="560" y1="250" x2="573" y2="250"/>
    <line x1="633" y1="250" x2="656" y2="250"/>
    <line x1="810" y1="250" x2="823" y2="250"/>
    <line x1="883" y1="250" x2="906" y2="250"/>
    <line x1="355" y1="278" x2="355" y2="336"/>
    <line x1="280" y1="370" x2="250" y2="370"/>
    <line x1="225" y1="349" x2="225" y2="284"/>
    <path d="M 605 278 V 370 H 656"/>
    <path d="M 810 370 H 855 V 282"/>
  </g>
  <text x="392" y="242" font-size="11.5" font-weight="700" fill="#22303c">sí</text>
  <text x="365" y="300" font-size="11.5" font-weight="700" fill="#22303c">no</text>
  <text x="642" y="242" font-size="11.5" font-weight="700" fill="#22303c">sí</text>
  <text x="615" y="300" font-size="11.5" font-weight="700" fill="#22303c">no</text>

  <!-- Flujos de mensaje -->
  <g stroke="#4a5b68" stroke-width="1.8" fill="none" stroke-dasharray="7 5" marker-start="url(#dotm)" marker-end="url(#arrm)">
    <line x1="120" y1="122" x2="120" y2="226"/>
    <line x1="200" y1="122" x2="200" y2="216"/>
    <line x1="400" y1="340" x2="400" y2="126"/>
    <line x1="930" y1="230" x2="930" y2="126"/>
  </g>
  <text x="112" y="150" font-size="11" fill="#4a5b68" text-anchor="end">solicitud</text>
  <text x="208" y="150" font-size="11" fill="#4a5b68">documentación subsanada</text>
  <text x="408" y="150" font-size="11" fill="#4a5b68">requerimiento de subsanación</text>
  <text x="922" y="150" font-size="11" fill="#4a5b68" text-anchor="end">resolución</text>

  <text x="978" y="486" font-size="12" fill="#8a949e" text-anchor="end">Elaboración propia.</text>
</svg>
