<svg xmlns="http://www.w3.org/2000/svg" width="940" height="440" viewBox="0 0 940 440" font-family="Helvetica, Arial, sans-serif">
  <rect width="940" height="440" fill="#ffffff"/>
  <text x="40" y="42" font-size="19" font-weight="700" fill="#1f3a5f">Ejemplo de proceso BPMN: envío semanal de la lista de incidencias</text>

  <defs>
    <marker id="arrf" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a5b68"/>
    </marker>
  </defs>

  <!-- Pool -->
  <rect x="40" y="70" width="860" height="310" fill="#ffffff" stroke="#5b87b0" stroke-width="1.6"/>
  <rect x="40" y="70" width="28" height="310" fill="#dbe7f3" stroke="#5b87b0" stroke-width="1.6"/>
  <text x="58" y="225" font-size="12.5" font-weight="700" fill="#1f3a5f" text-anchor="middle" transform="rotate(-90 58 225)">Grupo de trabajo</text>

  <!-- Evento de inicio (mensaje) -->
  <circle cx="130" cy="200" r="21" fill="#e9f2ea" stroke="#4e7d52" stroke-width="2"/>
  <rect x="121" y="194" width="18" height="12" fill="#ffffff" stroke="#4e7d52" stroke-width="1.4"/>
  <path d="M 121 194 l 9 7 l 9 -7" fill="none" stroke="#4e7d52" stroke-width="1.4"/>
  <text x="130" y="242" font-size="11" fill="#4a5b68" text-anchor="middle">grupo de trabajo</text>
  <text x="130" y="256" font-size="11" fill="#4a5b68" text-anchor="middle">activo</text>

  <!-- Evento intermedio temporizador -->
  <circle cx="255" cy="200" r="21" fill="#faeed7" stroke="#c9a24b" stroke-width="2"/>
  <circle cx="255" cy="200" r="15.5" fill="none" stroke="#c9a24b" stroke-width="2"/>
  <circle cx="255" cy="200" r="10" fill="none" stroke="#8a6a1c" stroke-width="1.4"/>
  <line x1="255" y1="200" x2="255" y2="193" stroke="#8a6a1c" stroke-width="1.4"/>
  <line x1="255" y1="200" x2="260" y2="203" stroke="#8a6a1c" stroke-width="1.4"/>
  <text x="255" y="242" font-size="11" fill="#4a5b68" text-anchor="middle">viernes a las 18:00</text>

  <!-- Tarea comprobar -->
  <rect x="330" y="170" width="155" height="60" rx="10" fill="#dbe7f3" stroke="#5b87b0" stroke-width="1.6"/>
  <text x="407" y="196" font-size="12.5" font-weight="700" fill="#22303c" text-anchor="middle">Comprobar el estado</text>
  <text x="407" y="214" font-size="12.5" font-weight="700" fill="#22303c" text-anchor="middle">del grupo</text>

  <!-- Compuerta exclusiva -->
  <path d="M 560 172 L 588 200 L 560 228 L 532 200 Z" fill="#faeed7" stroke="#c9a24b" stroke-width="1.8"/>
  <line x1="552" y1="192" x2="568" y2="208" stroke="#8a6a1c" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="568" y1="192" x2="552" y2="208" stroke="#8a6a1c" stroke-width="2.2" stroke-linecap="round"/>
  <text x="560" y="156" font-size="11.5" fill="#4a5b68" text-anchor="middle">¿el grupo sigue activo?</text>

  <!-- Tarea enviar -->
  <rect x="645" y="170" width="165" height="60" rx="10" fill="#dbe7f3" stroke="#5b87b0" stroke-width="1.6"/>
  <text x="727" y="196" font-size="12.5" font-weight="700" fill="#22303c" text-anchor="middle">Enviar la lista de</text>
  <text x="727" y="214" font-size="12.5" font-weight="700" fill="#22303c" text-anchor="middle">incidencias</text>

  <!-- Evento de fin -->
  <circle cx="560" cy="322" r="20" fill="#fbeae7" stroke="#b23b2e" stroke-width="4.5"/>
  <text x="600" y="327" font-size="11" fill="#4a5b68">fin del proceso</text>

  <!-- Objeto de datos -->
  <path d="M 830 255 h 26 l 12 12 v 38 h -38 z" fill="#faeed7" stroke="#c9a24b" stroke-width="1.5"/>
  <path d="M 856 255 v 12 h 12" fill="none" stroke="#c9a24b" stroke-width="1.5"/>
  <text x="849" y="330" font-size="11" fill="#4a5b68" text-anchor="middle">lista de</text>
  <text x="849" y="344" font-size="11" fill="#4a5b68" text-anchor="middle">incidencias</text>

  <!-- Flujos de secuencia -->
  <g stroke="#4a5b68" stroke-width="2" fill="none" marker-end="url(#arrf)">
    <line x1="151" y1="200" x2="230" y2="200"/>
    <line x1="276" y1="200" x2="326" y2="200"/>
    <line x1="485" y1="200" x2="528" y2="200"/>
    <line x1="588" y1="200" x2="641" y2="200"/>
    <line x1="560" y1="228" x2="560" y2="298"/>
    <path d="M 727 166 V 110 H 255 V 175"/>
  </g>
  <text x="610" y="192" font-size="11.5" font-weight="700" fill="#22303c">sí</text>
  <text x="570" y="262" font-size="11.5" font-weight="700" fill="#22303c">no</text>
  <text x="490" y="102" font-size="11" fill="#4a5b68">se repite cada semana</text>

  <!-- Asociación con el objeto de datos -->
  <line x1="812" y1="220" x2="838" y2="252" stroke="#4a5b68" stroke-width="1.6" stroke-dasharray="2 5"/>

  <text x="898" y="422" font-size="12" fill="#8a949e" text-anchor="end">Elaboración propia.</text>
</svg>
