<svg xmlns="http://www.w3.org/2000/svg" width="940" height="470" viewBox="0 0 940 470" font-family="Helvetica, Arial, sans-serif">
  <rect width="940" height="470" fill="#ffffff"/>
  <text x="40" y="46" font-size="20" font-weight="700" fill="#1f3a5f">Tablero Kanban: flujo de historias de usuario con límites WIP</text>

  <!-- Columnas -->
  <g stroke="#c6d2dc" stroke-width="1.5">
    <rect x="40"  y="78" width="203" height="330" rx="10" fill="#f2f5f8"/>
    <rect x="259" y="78" width="203" height="330" rx="10" fill="#f2f5f8"/>
    <rect x="478" y="78" width="203" height="330" rx="10" fill="#f2f5f8"/>
    <rect x="697" y="78" width="203" height="330" rx="10" fill="#f2f5f8"/>
  </g>

  <!-- Cabeceras -->
  <g font-size="14" font-weight="700" fill="#1f3a5f">
    <text x="54"  y="104">Backlog</text>
    <text x="273" y="104">Por hacer</text>
    <text x="492" y="104">En curso</text>
    <text x="711" y="104">Hecho</text>
  </g>
  <g stroke="#c6d2dc" stroke-width="1">
    <line x1="52"  y1="114" x2="231" y2="114"/>
    <line x1="271" y1="114" x2="450" y2="114"/>
    <line x1="490" y1="114" x2="669" y2="114"/>
    <line x1="709" y1="114" x2="888" y2="114"/>
  </g>
  <!-- Pastillas WIP -->
  <g>
    <rect x="386" y="88" width="62" height="20" rx="10" fill="#faeed7" stroke="#c9a24b" stroke-width="1.2"/>
    <text x="417" y="102" font-size="11.5" font-weight="700" fill="#8a6a1c" text-anchor="middle">WIP: 4</text>
    <rect x="605" y="88" width="62" height="20" rx="10" fill="#faeed7" stroke="#c9a24b" stroke-width="1.2"/>
    <text x="636" y="102" font-size="11.5" font-weight="700" fill="#8a6a1c" text-anchor="middle">WIP: 3</text>
  </g>

  <!-- Tarjetas: plantilla repetida -->
  <g stroke="#5b87b0" stroke-width="1.3">
    <!-- Backlog -->
    <rect x="54" y="124" width="175" height="44" rx="6" fill="#dbe7f3"/>
    <rect x="54" y="178" width="175" height="44" rx="6" fill="#dbe7f3"/>
    <rect x="54" y="232" width="175" height="44" rx="6" fill="#dbe7f3"/>
    <rect x="54" y="286" width="175" height="44" rx="6" fill="#dbe7f3"/>
    <!-- Por hacer -->
    <rect x="273" y="124" width="175" height="44" rx="6" fill="#dbe7f3"/>
    <rect x="273" y="178" width="175" height="44" rx="6" fill="#dbe7f3"/>
    <rect x="273" y="232" width="175" height="44" rx="6" fill="#dbe7f3"/>
    <!-- En curso -->
    <rect x="492" y="124" width="175" height="44" rx="6" fill="#dbe7f3"/>
    <rect x="492" y="178" width="175" height="44" rx="6" fill="#dbe7f3"/>
    <!-- Hecho -->
    <rect x="711" y="124" width="175" height="44" rx="6" fill="#e8eef0"/>
    <rect x="711" y="178" width="175" height="44" rx="6" fill="#e8eef0"/>
    <rect x="711" y="232" width="175" height="44" rx="6" fill="#e8eef0"/>
  </g>

  <!-- Etiquetas de tarjeta -->
  <g font-size="12.5" font-weight="700" fill="#22303c">
    <text x="66" y="142">HU-9</text>
    <text x="66" y="196">HU-10</text>
    <text x="66" y="250">HU-11</text>
    <text x="66" y="304">HU-12</text>
    <text x="285" y="142">HU-6</text>
    <text x="285" y="196">HU-7</text>
    <text x="285" y="250">HU-8</text>
    <text x="504" y="142">HU-4</text>
    <text x="504" y="196">HU-5</text>
    <text x="723" y="142">HU-1</text>
    <text x="723" y="196">HU-2</text>
    <text x="723" y="250">HU-3</text>
  </g>
  <!-- Líneas de descripción simuladas -->
  <g fill="#aebfcd">
    <rect x="66" y="150" width="130" height="6" rx="3"/>
    <rect x="66" y="204" width="110" height="6" rx="3"/>
    <rect x="66" y="258" width="122" height="6" rx="3"/>
    <rect x="66" y="312" width="100" height="6" rx="3"/>
    <rect x="285" y="150" width="124" height="6" rx="3"/>
    <rect x="285" y="204" width="104" height="6" rx="3"/>
    <rect x="285" y="258" width="116" height="6" rx="3"/>
    <rect x="504" y="150" width="118" height="6" rx="3"/>
    <rect x="504" y="204" width="126" height="6" rx="3"/>
  </g>
  <g fill="#c3cdd4">
    <rect x="723" y="150" width="112" height="6" rx="3"/>
    <rect x="723" y="204" width="120" height="6" rx="3"/>
    <rect x="723" y="258" width="98" height="6" rx="3"/>
  </g>
  <!-- Marcas de hecho -->
  <g stroke="#4e7d52" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 862 136 l 5 6 l 10 -12"/>
    <path d="M 862 190 l 5 6 l 10 -12"/>
    <path d="M 862 244 l 5 6 l 10 -12"/>
  </g>

  <!-- Flecha pull -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5a7d99"/>
    </marker>
  </defs>
  <line x1="560" y1="426" x2="380" y2="426" stroke="#5a7d99" stroke-width="2" marker-end="url(#arr)" stroke-dasharray="6 4"/>
  <text x="470" y="446" font-size="12" fill="#4a5b68" text-anchor="middle">sistema «pull»: solo se tira de nuevo trabajo al quedar capacidad libre</text>

  <text x="900" y="458" font-size="12" fill="#8a949e" text-anchor="end">Elaboración propia.</text>
</svg>
