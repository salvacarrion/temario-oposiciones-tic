<svg xmlns="http://www.w3.org/2000/svg" width="940" height="620" viewBox="0 0 940 620" font-family="Helvetica, Arial, sans-serif">
  <rect width="940" height="620" fill="#ffffff"/>
  <text x="40" y="42" font-size="19" font-weight="700" fill="#1f3a5f">DFD de nivel 1 del sistema de licencias urbanísticas</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5a7d99"/>
    </marker>
  </defs>

  <!-- Entidades externas -->
  <g stroke="#9aa5ae" stroke-width="1.6" fill="#eef1f4">
    <rect x="50" y="250" width="140" height="64"/>
    <rect x="470" y="60" width="150" height="72"/>
  </g>
  <text x="120" y="288" font-size="12.5" font-weight="700" fill="#22303c" text-anchor="middle">CIUDADANO</text>
  <text x="545" y="92" font-size="12" font-weight="700" fill="#22303c" text-anchor="middle">DEPARTAMENTO</text>
  <text x="545" y="110" font-size="12" font-weight="700" fill="#22303c" text-anchor="middle">URBANÍSTICO</text>

  <!-- Procesos -->
  <circle cx="300" cy="282" r="60" fill="#dbe7f3" stroke="#5b87b0" stroke-width="1.8"/>
  <text x="300" y="266" font-size="11.5" font-weight="700" fill="#22303c" text-anchor="middle">1. Registrar</text>
  <text x="300" y="284" font-size="11.5" font-weight="700" fill="#22303c" text-anchor="middle">y validar la</text>
  <text x="300" y="302" font-size="11.5" font-weight="700" fill="#22303c" text-anchor="middle">documentación</text>

  <circle cx="545" cy="282" r="60" fill="#dbe7f3" stroke="#5b87b0" stroke-width="1.8"/>
  <text x="545" y="276" font-size="11.5" font-weight="700" fill="#22303c" text-anchor="middle">2. Evaluar</text>
  <text x="545" y="294" font-size="11.5" font-weight="700" fill="#22303c" text-anchor="middle">la solicitud</text>

  <circle cx="790" cy="282" r="60" fill="#dbe7f3" stroke="#5b87b0" stroke-width="1.8"/>
  <text x="790" y="276" font-size="11.5" font-weight="700" fill="#22303c" text-anchor="middle">3. Emitir la</text>
  <text x="790" y="294" font-size="11.5" font-weight="700" fill="#22303c" text-anchor="middle">resolución</text>

  <!-- Almacén A1 -->
  <line x1="390" y1="480" x2="650" y2="480" stroke="#22303c" stroke-width="2"/>
  <line x1="390" y1="514" x2="650" y2="514" stroke="#22303c" stroke-width="2"/>
  <text x="520" y="502" font-size="12" font-weight="700" fill="#22303c" text-anchor="middle">A1 · Base de datos de solicitudes</text>

  <!-- Flujo principal -->
  <g stroke="#5a7d99" stroke-width="1.7" fill="none" marker-end="url(#arr)">
    <line x1="190" y1="268" x2="238" y2="270"/>
    <line x1="240" y1="296" x2="192" y2="298"/>
    <line x1="360" y1="282" x2="481" y2="282"/>
    <line x1="605" y1="282" x2="726" y2="282"/>
    <line x1="530" y1="224" x2="530" y2="136"/>
    <line x1="560" y1="136" x2="560" y2="224"/>
  </g>
  <!-- Escrituras en el almacén -->
  <g stroke="#5a7d99" stroke-width="1.7" fill="none" marker-end="url(#arr)">
    <line x1="322" y1="336" x2="420" y2="476"/>
    <line x1="545" y1="342" x2="528" y2="476"/>
    <line x1="762" y1="334" x2="642" y2="478"/>
  </g>
  <!-- Resolución al ciudadano (ruta inferior) -->
  <path d="M 790 342 V 570 H 120 V 318" stroke="#5a7d99" stroke-width="1.7" fill="none" marker-end="url(#arr)"/>

  <!-- Etiquetas -->
  <g font-size="10.5" fill="#4a5b68" paint-order="stroke" stroke="#ffffff" stroke-width="3.5" stroke-linejoin="round">
    <text x="52" y="238">solicitud con documentación</text>
    <text x="52" y="338">requerimiento de subsanación</text>
    <text x="368" y="272">expediente validado</text>
    <text x="640" y="272">dictamen</text>
    <text x="522" y="180" text-anchor="end">expediente a evaluar</text>
    <text x="568" y="180">informe técnico</text>
    <text x="352" y="420" text-anchor="end">alta de la solicitud</text>
    <text x="556" y="420">actualización de estado</text>
    <text x="704" y="420">registro de la resolución</text>
    <text x="455" y="562" text-anchor="middle">resolución (aprobada o denegada)</text>
  </g>

  <text x="900" y="604" font-size="12" fill="#8a949e" text-anchor="end">Elaboración propia.</text>
</svg>
