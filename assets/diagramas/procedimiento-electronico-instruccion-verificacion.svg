<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5B7183"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="940" height="430" rx="8" fill="#FFFFFF"/>
  <text x="24" y="36" font-size="17" font-weight="bold" fill="#1F3A55">Fase de instrucción (I): verificación y consulta de datos</text>

  <!-- Procedimiento -->
  <rect x="24" y="170" width="170" height="92" rx="8" fill="#2C6E9E"/>
  <text x="109" y="200" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Procedimiento</text>
  <text x="109" y="218" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">administrativo</text>
  <text x="109" y="240" font-size="11.5" fill="#D8E8F5" text-anchor="middle">tramitador · MART-e</text>

  <!-- PAI -->
  <rect x="300" y="150" width="210" height="120" rx="8" fill="#D2E5F5" stroke="#2C6E9E" stroke-width="2"/>
  <text x="405" y="182" font-size="15" font-weight="bold" fill="#1F3A55" text-anchor="middle">PAI</text>
  <text x="405" y="202" font-size="13" font-weight="bold" fill="#1F3A55" text-anchor="middle">servicios de verificación</text>
  <text x="405" y="224" font-size="11.5" fill="#33424F" text-anchor="middle">SCSP · sello de órgano</text>
  <text x="405" y="240" font-size="11.5" fill="#33424F" text-anchor="middle">traza de cada consulta</text>

  <!-- PID -->
  <rect x="600" y="64" width="170" height="72" rx="8" fill="#FBF0DE" stroke="#C08A2D" stroke-width="1.5"/>
  <text x="685" y="94" font-size="13.5" font-weight="bold" fill="#5C4413" text-anchor="middle">PID (AGE)</text>
  <text x="685" y="114" font-size="11.5" fill="#5C4413" text-anchor="middle">intermediación de datos</text>

  <!-- Proveedores estatales -->
  <rect x="800" y="52" width="120" height="96" rx="8" fill="#FFFFFF" stroke="#8296A6" stroke-width="1.5"/>
  <text x="860" y="78" font-size="12" font-weight="bold" fill="#33424F" text-anchor="middle">Proveedores</text>
  <text x="860" y="94" font-size="12" font-weight="bold" fill="#33424F" text-anchor="middle">estatales</text>
  <text x="860" y="114" font-size="11.5" fill="#33424F" text-anchor="middle">AEAT · TGSS</text>
  <text x="860" y="130" font-size="11.5" fill="#33424F" text-anchor="middle">INSS · DGP…</text>

  <!-- Proveedores GVA -->
  <rect x="600" y="290" width="320" height="96" rx="8" fill="#EDF6EE" stroke="#4C9A5F" stroke-width="1.5"/>
  <text x="760" y="318" font-size="13" font-weight="bold" fill="#24512F" text-anchor="middle">Proveedores GVA</text>
  <text x="760" y="338" font-size="11.5" fill="#33424F" text-anchor="middle">deudas con la GVA · discapacidad · JQCV</text>
  <text x="760" y="354" font-size="11.5" fill="#33424F" text-anchor="middle">familia numerosa y monoparental…</text>

  <!-- Flechas -->
  <g stroke="#5B7183" stroke-width="2" fill="none">
    <line x1="198" y1="216" x2="296" y2="216" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="514" y1="192" x2="596" y2="116" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="470" y1="274" x2="630" y2="286" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <line x1="774" y1="100" x2="796" y2="100" marker-end="url(#arrow)"/>
  </g>

  <text x="24" y="414" font-size="11" fill="#8A97A3">La PAI no almacena el contenido de los intercambios.</text>
  <text x="916" y="414" font-size="11" fill="#8A97A3" text-anchor="end">Elaboración propia.</text>
</svg>
