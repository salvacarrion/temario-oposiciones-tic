<script>
document.addEventListener("DOMContentLoaded", function() {
    const moveTOC = () => {
        const activeLink = document.querySelector('.sidebar-item-text.sidebar-link.active');
        const toc = document.getElementById('TOC');
        if (activeLink && toc) {
            const parentLi = activeLink.closest('.sidebar-item');
            if (parentLi) {
                // Find the actual <ul> containing headings inside the TOC
                const mainList = toc.querySelector('ul');
                if (mainList) {
                    const newTocContainer = document.createElement('div');
                    newTocContainer.className = 'sidebar-local-toc';
                    
                    // Move the actual list element to preserve scroll-spy active state tracking
                    newTocContainer.appendChild(mainList);
                    parentLi.appendChild(newTocContainer);
                }
            }
        }
    };
    
    // Minimal delay to ensure Quarto's DOM has fully stabilized
    setTimeout(moveTOC, 50);
});
</script>

<style>
/* Hide the original right margin sidebar and TOC wrapper completely */
#quarto-margin-sidebar, #TOC {
    display: none !important;
}

/* Style the integrated local TOC in the left sidebar (ReadTheDocs style) */
.sidebar-local-toc {
    margin-top: 0.25rem;
    margin-bottom: 0.5rem;
    padding-left: 0.75rem;
    border-left: 1.5px solid #e1e4e5; /* ReadTheDocs light grey vertical guide */
    margin-left: 1.25rem;
}

.sidebar-local-toc ul {
    list-style-type: none !important;
    padding-left: 0 !important;
    margin: 0 !important;
}

/* Secondary levels (H3 headings) if any */
.sidebar-local-toc ul ul {
    padding-left: 0.75rem !important;
    border-left: 1px solid #e1e4e5;
    margin-top: 0.15rem !important;
    margin-bottom: 0.15rem !important;
}

.sidebar-local-toc li {
    margin: 0 !important;
    padding: 0 !important;
}

.sidebar-local-toc a {
    color: #555555 !important;
    font-size: 0.85em !important;
    text-decoration: none !important;
    display: block !important;
    padding: 0.2rem 0 !important;
    line-height: 1.3 !important;
    transition: color 0.15s ease-in-out;
}

.sidebar-local-toc a:hover {
    color: #2980b9 !important; /* ReadTheDocs accent blue on hover */
}

/* Active sub-item highlight via scroll-spy */
.sidebar-local-toc a.active {
    color: #2980b9 !important; /* Active blue color */
    font-weight: 600 !important;
}
</style>
